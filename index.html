<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sito Esempio Contest Fotografico</title>
    <style>
        @font-face {
            font-family: 'FunnelDisplay';
            src: url('font/FunnelDisplay-Bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }
        @font-face {
            font-family: 'FunnelDisplaySemiBold';
            src: url('font/FunnelDisplay-SemiBold.ttf') format('truetype');
            font-weight: 600;
            font-style: normal;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            min-height: 100vh;
            height: auto;
            overflow-x: hidden;
            background: #fff;
            font-family: 'FunnelDisplay', Arial, sans-serif;
        }
        .img-container {
            width: 100vw;
            min-height: 100vh;
            height: auto;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            position: relative;
        }
        .site-img {
            width: 100vw;
            height: auto;
            min-height: 100vh;
            display: block;
            object-fit: contain;
        }
        .overlay-btn {
            position: absolute;
            left: calc(50% + 20px);
            top: calc(80% + 145px);
            transform: translate(-50%, -50%);
            background: none;
            color: #e5458b;
            font-size: 4.2rem;
            font-family: 'FunnelDisplay', Arial, sans-serif;
            font-weight: bold;
            padding: 0;
            border-radius: 0;
            text-decoration: underline;
            box-shadow: none;
            transition: color 0.2s;
            z-index: 10;
            letter-spacing: 0.04em;
            border: none;
            cursor: pointer;
        }
        .overlay-btn:hover {
            color: #4D1C32;
        }
        .instagram-icon-container {
            position: absolute;
            left: calc(50% + 20px);
            top: calc(80% + 145px + 450px);
            transform: translate(-50%, 0);
            z-index: 10;
            width: 240px;
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .instagram-icon-container a {
            display: inline-block;
            border-radius: 50%;
        }
        .instagram-icon-container a:active .instagram-icon {
            filter: brightness(0.7) saturate(1.2) hue-rotate(-10deg);
        }
        .instagram-icon-container a:hover .instagram-icon,
        .instagram-icon-container a:focus .instagram-icon {
            filter: brightness(0.7) saturate(1.2) hue-rotate(-10deg) drop-shadow(0 0 0 #4D1C32);
        }
        .instagram-icon {
            width: 240px;
            height: 240px;
            display: block;
            transition: filter 0.2s;
        }
        .mu-d-caption {
            position: absolute;
            left: calc(50% + 20px);
            top: calc(80% + 145px + 450px + 240px + 24px);
            transform: translate(-50%, 0);
            font-family: 'FunnelDisplaySemiBold', 'FunnelDisplay', Arial, sans-serif;
            font-size: 2.2rem;
            color: #e5458b;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-align: center;
            z-index: 11;
            background: none;
            margin: 0;
            padding: 0;
            cursor: pointer;
            text-decoration: underline;
        }
        .mu-d-caption:active,
        .mu-d-caption:hover, .mu-d-caption:focus {
            color: #4D1C32;
        }
        @media (max-width: 600px) {
            .site-img {
                min-height: 100vh;
            }
            .overlay-btn {
                font-size: 2.2rem;
                left: 50%;
                top: 78%;
                padding: 0.3em 0.8em;
            }
            .instagram-icon-container {
                top: 82%;
                left: 50%;
                width: 90px;
                height: 90px;
            }
            .instagram-icon {
                width: 90px;
                height: 90px;
            }
            .mu-d-caption {
                top: calc(82% + 90px + 12px);
                left: 50%;
                font-size: 1.1rem;
                padding: 0 0.5em;
            }
        }
    </style>
</head>
<body>
    <div class="img-container">
        <img src="sito 3.png" alt="Sito esempio contest fotografico" class="site-img">
        <a href="mailto:mud.contestfotografico@gmail.com" class="overlay-btn">PARTECIPA ORA</a>
        <div class="instagram-icon-container">
            <a href="https://www.instagram.com/milanouniversitydistrict/" target="_blank" rel="noopener noreferrer">
                <img src="instagram.svg" alt="Instagram" class="instagram-icon">
            </a>
        </div>
        <a href="https://www.instagram.com/milanouniversitydistrict/" target="_blank" rel="noopener noreferrer" class="mu-d-caption">clicca per scoprire cos'è il Mu.D</a>
    </div>
</body>
</html>
