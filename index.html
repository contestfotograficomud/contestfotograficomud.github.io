<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MuD</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: sans-serif;
      padding: 2rem 1.5rem 0;
      gap: 1.5rem;
    }

    .nav-logo {
      height: 50px;
      width: auto;
      display: block;
    }

    .nav-logo-fallback {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: 0.1em;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .video-container {
      position: relative;
      width: 100%;
      max-width: 960px;
      padding-top: 56.25%;
      border-radius: 12px;
      overflow: hidden;
    }

    .video-container iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    footer {
      position: sticky;
      bottom: 0;
      width: 100%;
      background: #fff;
      font-size: 0.75rem;
      color: #888;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      padding: 0.75rem 0 1rem;
      margin-top: 1.5rem;
    }

    footer a {
      color: #888;
      text-decoration: none;
    }

    footer a:hover { color: #000; }
  </style>
</head>
<body>

  <img
    src="img/logoMuDFooter.png"
    alt="MuD logo"
    class="nav-logo"
    onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block';"
  />
  <span id="logo-fallback" style="display:none;" class="nav-logo-fallback">MuD</span>

  <div class="main">
    <div class="video-container">
      <iframe
        src="https://drive.google.com/file/d/1cFhI4xBVXKW6vcwo_MdPF44xjsq2Fe9R/preview"
        allow="autoplay"
        allowfullscreen
      ></iframe>
    </div>
  </div>

  <footer>
    <a href="https://www.instagram.com/milanouniversitydistrict" target="_blank" rel="noopener">@milanouniversitydistrict</a>
    <span>© MuD 2026</span>
  </footer>

</body>
</html>
